name: CI / Audit Engineering

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync --all-extras
        uv pip install --system pytest ruff bandit

    - name: Lint with Ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Security SAST with Bandit
      run: |
        bandit -c pyproject.toml -r .

    - name: Run Pytest Suite
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v

    - name: Verify Docker Container Build
      run: |
        docker build -t scf-app-test .
